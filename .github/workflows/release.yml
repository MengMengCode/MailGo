name: Build Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare embedded frontend
        run: |
          rm -rf backend/frontend-dist
          mkdir -p backend/frontend-dist
          cp -R frontend/dist/. backend/frontend-dist/

      - name: Build Linux binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          for arch in amd64 arm64; do
            asset="mailgo-linux-${arch}"
            workdir="dist/${asset}"
            mkdir -p "${workdir}"

            (
              cd backend
              CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build -trimpath -ldflags="-s -w" -o "../${workdir}/mailgo" .
            )

            cp README.md LICENSE .env.example "${workdir}/"
            tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
            rm -rf "${workdir}"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mailgo-linux-amd64.tar.gz
            dist/mailgo-linux-arm64.tar.gz
